# This is an optional matrix version of the CI workflow.
# It keeps the same CI story, but repeats the test job for more than one Python version.
name: 82 EXERCISE CI Matrix Workflow

on:
  # Keep this exercise manual-only so it does not distract from the core CI lab.
  workflow_dispatch:

jobs:
  run-tests:
    # A matrix repeats the same job with different values.
    strategy:
      # Let both matrix runs finish so students can compare them even if one fails.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    # Each matrix run gets its own fresh runner.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Bring the repository files onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        # Repeat this setup step for each Python version in the matrix.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show active Python version
        # This helps students see which matrix run they are looking at.
        run: python --version

      - name: Run tests
        # The same test command runs once for each matrix value.
        run: python -m unittest discover -s tests -v
